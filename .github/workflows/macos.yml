name: macOS

on:
  push:
    branches: [ main, vanilla_classic ]
  pull_request:
    branches: [ main, vanilla_classic ]

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        preset: [default, debug]
        
    name: macOS-${{ matrix.preset }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Homebrew packages
      run: |
        brew update
        brew install cmake ninja
        brew install boost mysql-client openssl@3 readline
        
        # Use Clang (default on macOS)
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV
        
        # Set OpenSSL path
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
        
        # Add MySQL to PATH
        echo "$(brew --prefix mysql-client)/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: |
        cmake --preset ${{ matrix.preset }}

    - name: Build
      run: |
        cmake --build --preset ${{ matrix.preset }} --parallel $(sysctl -n hw.ncpu)

    - name: Test
      if: matrix.preset == 'debug'
      run: |
        cd build/${{ matrix.preset }}
        ctest --output-on-failure --parallel 2

    - name: Install
      run: |
        cmake --install build/${{ matrix.preset }}

    - name: Check executables
      run: |
        # Check default install location based on preset
        if [ "${{ matrix.preset }}" = "default" ] || [ "${{ matrix.preset }}" = "debug" ] || [ "${{ matrix.preset }}" = "release" ]; then
          BIN_PATH="/opt/trinity-core/vanilla-classic/bin"
        else
          BIN_PATH="/usr/local/bin"
        fi
        
        if [ -f "${BIN_PATH}/worldserver" ]; then
          "${BIN_PATH}/worldserver" --version
        else
          echo "worldserver not found at ${BIN_PATH}"
          ls -la "${BIN_PATH}/" 2>/dev/null || echo "Directory does not exist"
        fi
        
        if [ -f "${BIN_PATH}/bnetserver" ]; then
          "${BIN_PATH}/bnetserver" --version
        else
          echo "bnetserver not found at ${BIN_PATH}"
        fi

    - name: Create Release Package
      if: matrix.preset == 'release' && matrix.compiler == 'clang' && github.event_name == 'push'
      run: |
        BIN_PATH="/opt/trinity-core/vanilla-classic"
        
        if [ -d "${BIN_PATH}" ]; then
          # Create package
          tar -czf "TrinityCore-macOS-release.tar.gz" -C /opt/trinity-core vanilla-classic
          
          # Create disk image (DMG) for distribution
          mkdir -p dmg_temp
          cp -R "${BIN_PATH}" dmg_temp/TrinityCore
          hdiutil create -volname "TrinityCore" -srcfolder dmg_temp -ov -format UDZO "TrinityCore-macOS-release.dmg"
          rm -rf dmg_temp
        fi

    - name: Upload Release Artifacts
      if: matrix.preset == 'release' && matrix.compiler == 'clang' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: macos-release-${{ matrix.preset }}
        path: |
          TrinityCore-macOS-*.tar.gz
          TrinityCore-macOS-*.dmg
        retention-days: 30

    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macos-build-logs-${{ matrix.preset }}-${{ matrix.compiler }}
        path: |
          build/${{ matrix.preset }}/CMakeFiles/CMakeOutput.log
          build/${{ matrix.preset }}/CMakeFiles/CMakeError.log
        retention-days: 7